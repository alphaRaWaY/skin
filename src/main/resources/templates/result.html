<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码成功</title>
    <style>
        /* 设置整个页面的背景色和字体 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh; /* 视口高度，确保页面全屏 */
            background: #f0f8ff; /* 轻柔的蓝色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: #2c3e50;
            overflow: hidden;
        }

        /* 容器背景设置 */
        .container {
            text-align: center;
            background: #fff;
            padding: 50px 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        /* 标题样式 */
        h1 {
            font-size: 28px;
            color: #006600; /* 成功绿色 */
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 文字样式 */
        p {
            font-size: 18px;
            line-height: 1.6;
            color: #34495e; /* 深灰色文字 */
        }

        /* 按钮样式 */
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #006600; /* 成功绿色 */
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #00AA00; /* 按钮悬停颜色 */
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${finalHead}">恭喜！</h1>
    <p th:text="${finalResult}">你已经成功重置密码，现在可以关闭此页面！</p>
    <button class="btn" onclick="closePage()">关闭页面</button>
</div>

<script>
    // 当点击关闭页面按钮时，关闭当前页面
    function closePage() {
        window.close();
    }
</script>
</body>
</html>
