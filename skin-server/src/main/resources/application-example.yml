spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/skin?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: <DB_USERNAME>
    password: <DB_PASSWORD>
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379

aliyun:
  oss:
    endpoint: <OSS_ENDPOINT>
    bucketname: <OSS_BUCKET>
    region: <OSS_REGION>

services:
  ai:
    base-url: http://127.0.0.1:19082
  analyzer:
    mode: mock # mock | python
  model:
    base-url: http://127.0.0.1:5000
    predict-path: /api/v1/predict
