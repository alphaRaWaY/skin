spring:
  application:
    name: skin-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

logging:
  file:
    name: target/skin-server.log

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 19083
  address: 0.0.0.0

services:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://127.0.0.1:19082}
  analyzer:
#    mode: ${ANALYZER_MODE:mock}
    mode: ${ANALYZER_MODE:python}
  model:
    base-url: ${MODEL_SERVICE_BASE_URL:http://127.0.0.1:19090}
    predict-path: ${MODEL_SERVICE_PREDICT_PATH:/api/v1/predict}
