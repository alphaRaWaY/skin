spring:
  application:
    name: skin-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

logging:
  file:
    name: target/skin-server.log

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8083
  address: 0.0.0.0

services:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://127.0.0.1:8082}
  lsatrans:
    base-url: ${LSATRANS_BASE_URL:http://127.0.0.1:8090}
