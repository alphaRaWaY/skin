apiVersion: apps/v1
kind: Deployment
metadata:
  name: skin-auth
  namespace: skinai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skin-auth
  template:
    metadata:
      labels:
        app: skin-auth
    spec:
      containers:
        - name: skin-auth
          image: alpharaway/skin-auth:v1
          ports:
            - containerPort: 19081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/skin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skinai-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skinai-secret
                  key: MYSQL_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: skinai-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: skinai-config
                  key: REDIS_PORT
            - name: WECHAT_APPID
              valueFrom:
                secretKeyRef:
                  name: skinai-secret
                  key: WECHAT_APPID
            - name: WECHAT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skinai-secret
                  key: WECHAT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: skin-auth
  namespace: skinai
spec:
  selector:
    app: skin-auth
  ports:
    - port: 19081
      targetPort: 19081
---
