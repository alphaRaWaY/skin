spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/skin?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: <DB_USERNAME>
    password: <DB_PASSWORD>
    driver-class-name: com.mysql.cj.jdbc.Driver
  cache:
    redis:
      host: 127.0.0.1
      port: 6379
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: <DEEPSEEK_API_KEY>
      chat:
        options:
          model: deepseek-chat
