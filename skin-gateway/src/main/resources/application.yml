server:
  port: 8080

spring:
  application:
    name: skin-gateway
  cloud:
    gateway:
      routes:
        - id: skin-auth
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/login/**,/api/public/**,/api/hello/**
        - id: skin-ai
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/deepseek/**
        - id: skin-core
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/reports/**,/api/family/**,/api/oss/**
        - id: skin-lsatrans
          uri: http://127.0.0.1:8090
          predicates:
            - Path=/api/lsatrans/**
