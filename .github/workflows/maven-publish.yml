name: Build on Pull Request #在pull时自动打包

on:
  pull_request:
    branches:
      - main  # 仅在目标分支为 main 时触发（可以根据需要修改）

jobs:
  build:
    runs-on: ubuntu-latest  # 选择运行环境，这里是 Ubuntu

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4  # 获取代码

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'  # 设置 JDK 版本
        distribution: 'temurin'  # 使用 Temurin 作为 JDK 发行版

    - name: Build with Maven
      run: mvn -B package --file pom.xml  # 使用 Maven 进行打包
