name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  maven-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java modules
        run: mvn -B -DskipTests package
